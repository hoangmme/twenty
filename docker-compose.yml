name: twenty

services:
  server:
    image: twentycrm/twenty:${TAG:-latest}
    command: >
      sh -c "curl -sL -o /app/packages/twenty-server/dist/front/images/icons/android/android-launchericon-192-192.png https://mme.com.vn/wp-content/uploads/2023/01/mme-thiet-ke-website-logo-vuong.png || true; grep -q 'hide-enterprise' /app/packages/twenty-server/dist/front/index.html || sed -i 's|</head>|<style id=\"hide-enterprise\">a[href*=\"enterprise\"], a[href*=\"security\"] { display: none !important; }</style></head>|' /app/packages/twenty-server/dist/front/index.html; sed -i 's/if (!has2FAEnabled)/if (false)/g' /app/packages/twenty-server/dist/engine/core-modules/impersonation/services/impersonation.service.js || true; node -e \"const { Client } = require('pg'); const Redis = require('ioredis'); const sleep = (ms) => new Promise((r) => setTimeout(r, ms)); (async () => { if (process.env.REDIS_URL) { try { const r = new Redis(process.env.REDIS_URL); await r.flushall(); console.log('Redis flushed'); r.disconnect(); } catch (e) { console.log('Redis error:', e.message); } } for (let i = 0; i < 15; i++) { const c = new Client({ connectionString: process.env.PG_DATABASE_URL }); try { await c.connect(); try { await c.query('DELETE FROM \\\"core\\\".\\\"twoFactorAuthenticationMethod\\\"'); console.log('2FA wiped camelCase'); } catch (e) { await c.query('DELETE FROM \\\"core\\\".\\\"two_factor_authentication_method\\\"'); console.log('2FA wiped snakeCase'); } c.end(); break; } catch (err) { console.log('DB retry ' + i + ': ' + err.message); c.end(); await sleep(2000); } } })().catch(console.error);\" || true; node dist/main"
    volumes:
      - server-local-data-v5:/app/packages/twenty-server/.local-storage
    ports:
      - "3020:3000"
    environment:
      NODE_PORT: 3000
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-postgres}:${PG_DATABASE_PASSWORD:-postgres}@${PG_DATABASE_HOST:-db}:${PG_DATABASE_PORT:-5432}/${PG_DATABASE_NAME:-default}
      SERVER_URL: ${SERVER_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DISABLE_DB_MIGRATIONS: ${DISABLE_DB_MIGRATIONS:-false}
      DISABLE_CRON_JOBS_REGISTRATION: ${DISABLE_CRON_JOBS_REGISTRATION:-false}

      IS_MULTIWORKSPACE_ENABLED: ${IS_MULTIWORKSPACE_ENABLED:-false}
      DEFAULT_SUBDOMAIN: ${DEFAULT_SUBDOMAIN:-app}
      IS_WORKSPACE_CREATION_LIMITED_TO_SERVER_ADMINS: ${IS_WORKSPACE_CREATION_LIMITED_TO_SERVER_ADMINS:-true}
      FRONT_AUTO_BASE_URL: "true"

      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      # STORAGE_S3_REGION: ${STORAGE_S3_REGION}
      # STORAGE_S3_NAME: ${STORAGE_S3_NAME}
      # STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT}

      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # FALLBACK_ENCRYPTION_KEY: ${FALLBACK_ENCRYPTION_KEY}
      APP_SECRET: ${APP_SECRET:-}

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: curl --fail http://localhost:3000/healthz || exit 1
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 300s
    restart: always

  worker:
    image: twentycrm/twenty:${TAG:-latest}
    volumes:
      - server-local-data-v5:/app/packages/twenty-server/.local-storage
    command: ["yarn", "worker:prod"]
    environment:
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-postgres}:${PG_DATABASE_PASSWORD:-postgres}@${PG_DATABASE_HOST:-db}:${PG_DATABASE_PORT:-5432}/${PG_DATABASE_NAME:-default}
      SERVER_URL: ${SERVER_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DISABLE_DB_MIGRATIONS: "true"
      DISABLE_CRON_JOBS_REGISTRATION: "true"

      IS_MULTIWORKSPACE_ENABLED: ${IS_MULTIWORKSPACE_ENABLED:-false}
      DEFAULT_SUBDOMAIN: ${DEFAULT_SUBDOMAIN:-app}
      IS_WORKSPACE_CREATION_LIMITED_TO_SERVER_ADMINS: ${IS_WORKSPACE_CREATION_LIMITED_TO_SERVER_ADMINS:-true}
      FRONT_AUTO_BASE_URL: "true"

      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      # STORAGE_S3_REGION: ${STORAGE_S3_REGION}
      # STORAGE_S3_NAME: ${STORAGE_S3_NAME}
      # STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT}

      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # FALLBACK_ENCRYPTION_KEY: ${FALLBACK_ENCRYPTION_KEY}
      APP_SECRET: ${APP_SECRET:-}

    depends_on:
      db:
        condition: service_healthy
      server:
        condition: service_healthy
    restart: always

  db:
    image: postgres:16
    volumes:
      - twenty-db-data-v5:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${PG_DATABASE_NAME:-default}
      POSTGRES_PASSWORD: ${PG_DATABASE_PASSWORD:-postgres}
      POSTGRES_USER: ${PG_DATABASE_USER:-postgres}
    healthcheck:
      test: pg_isready -U ${PG_DATABASE_USER:-postgres} -h localhost -d postgres
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  redis:
    image: redis
    restart: always
    command: ["--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  twenty-db-data-v5:
  server-local-data-v5:

networks:
  dokploy-network:
    external: true
